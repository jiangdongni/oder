<style>
  :root {
    --gold: #c8a96e;
    --gold-light: #e8d080;
    --bg: #0f1117;
    --bg2: #13151f;
    --bg3: #1a1d27;
    --border: #2a2d3a;
    --text: #e8e0d0;
    --muted: #5a5040;
    --red: #e05050;
    --green: #3cb464;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', SimSun, serif; overflow: hidden; }
  ::-webkit-scrollbar { display: none; }

  /* 布局 */
  .app { display: flex; flex-direction: column; height: 100dvh; }
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 16px; flex-shrink: 0; }
  .content { flex: 1; overflow-y: auto; padding: 12px 14px 8px; }
  .bottom-nav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; padding: 10px 4px 8px; border: none; background: transparent; color: var(--muted); font-family: inherit; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.15s; }
  .nav-btn.active { color: var(--gold); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* 输入面板 */
  .input-panel { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 14px; flex-shrink: 0; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  textarea.order-input {
    flex: 1; background: var(--bg3); border: 1px solid #3a3520;
    color: var(--text); font-family: inherit; font-size: 15px;
    padding: 10px 12px; border-radius: 10px; resize: none; outline: none;
    line-height: 1.5; min-height: 44px; max-height: 100px;
  }
  textarea.order-input:focus { border-color: rgba(200,169,110,0.5); }
  textarea.order-input::placeholder { color: var(--muted); }

  /* 麦克风大按钮 */
  .mic-btn {
    width: 52px; height: 52px; border-radius: 50%;
    border: 2px solid var(--gold); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .mic-btn.listening {
    background: rgba(220,60,60,0.15); border-color: var(--red);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,60,60,0.4)} 50%{box-shadow:0 0 0 10px rgba(220,60,60,0)} }

  .submit-btn {
    height: 52px; padding: 0 18px; background: var(--gold);
    border: none; color: #0f1117; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer;
    border-radius: 10px; white-space: nowrap; flex-shrink: 0;
    transition: all 0.15s;
  }
  .submit-btn:active { background: #b89858; transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.45; }

  /* Toast 消息 */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 20px; font-size: 14px;
    z-index: 999; white-space: nowrap; font-weight: 600;
    animation: fadeIn 0.2s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.success { background: rgba(60,180,100,0.95); color: #fff; }
  .toast.error { background: rgba(220,60,60,0.95); color: #fff; }
  @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

  /* 桌号卡片 */
  .table-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
  }
  .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .table-name { font-size: 17px; font-weight: 700; color: var(--gold); }
  .table-actions { display: flex; gap: 8px; align-items: center; }
  .badge { background: rgba(200,169,110,0.15); color: var(--gold); border: 1px solid rgba(200,169,110,0.25); border-radius: 4px; padding: 2px 8px; font-size: 12px; }
  .clear-table-btn { padding: 5px 12px; border: 1px solid rgba(220,60,60,0.3); background: transparent; color: rgba(220,60,60,0.7); cursor: pointer; font-family: inherit; font-size: 12px; border-radius: 6px; }

  .item-name { flex: 1; min-width: 0; }

  .table-total { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(200,169,110,0.2); display: flex; justify-content: space-between; align-items: center; }
  .table-total-label { font-size: 13px; color: var(--muted); }
  .table-total-amount { font-size: 22px; font-weight: 700; color: var(--gold); }
  .table-note { margin-top: 8px; padding: 6px 10px; background: rgba(200,169,110,0.07); border-radius: 6px; font-size: 13px; color: #a89060; }

  /* 厨房卡片 */
  .cat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 15px; font-weight: 700; color: var(--gold); }
  .cat-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #1f2233; font-size: 14px; }
  .cat-qty { font-size: 20px; font-weight: 700; }

  /* 日志 */
  .log-item { padding: 10px 12px; background: var(--bg3); border-radius: 8px; margin-bottom: 6px; font-size: 13px; border: 1px solid var(--border); }
  .log-time { color: var(--muted); font-size: 12px; margin-bottom: 3px; }

  /* 空状态 */
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* 底栏工具 */
  .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 0 0 12px; }
  .export-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-family: inherit; font-size: 13px; border-radius: 8px; cursor: pointer; }
  .export-btn:active { background: rgba(200,169,110,0.12); }
  .danger-btn { padding: 8px 16px; border: 1px solid rgba(220,60,60,0.3); background: transparent; color: rgba(220,60,60,0.7); font-family: inherit; font-size: 13px; border-radius: 8px; cursor: pointer; }
  .danger-btn:active { background: rgba(220,60,60,0.1); }

  /* 统计栏 */
  .stats { display: flex; gap: 0; }
  .stat { flex: 1; text-align: center; }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--gold); }
  .stat-val.revenue { color: var(--gold-light); }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .stat-divider { width: 1px; background: var(--border); margin: 4px 0; }

  /* API Key 弹窗 */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: flex-end; z-index: 1000; }
  .modal-sheet { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 28px 20px 40px; width: 100%; border-top: 1px solid var(--border); }
  .modal-title { font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
  .modal-desc { font-size: 14px; color: #8a7a5a; line-height: 1.7; margin-bottom: 20px; }
  .modal-input { width: 100%; background: var(--bg); border: 1px solid #3a3520; color: var(--text); font-family: monospace; font-size: 14px; padding: 12px 14px; border-radius: 10px; outline: none; }
  .modal-input:focus { border-color: rgba(200,169,110,0.5); }
  .modal-btn { width: 100%; padding: 14px; background: var(--gold); border: none; color: #0f1117; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; border-radius: 12px; margin-top: 14px; }
  .modal-btn:active { background: #b89858; }

  /* 大号录音状态提示 */
  .listening-bar { background: rgba(220,60,60,0.12); border: 1px solid rgba(220,60,60,0.3); border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #e87040; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .blink { animation: blink 1s infinite; }
</style>

];
const CATEGORY_ORDER = ["鱼鲜类","猪肉内脏类","牛羊肉类","鸡禽类","蔬菜类","主食杂项"];

function loadOrders() {
  try { const r = localStorage.getItem("orders_"+new Date().toDateString()); return r ? JSON.parse(r) : {}; }
  catch { return {}; }
}
function saveOrders(o) {
  try { localStorage.setItem("orders_"+new Date().toDateString(), JSON.stringify(o)); } catch{}
}
function loadApiKey() { return localStorage.getItem("anthropic_api_key") || ""; }
function saveApiKey(k) { localStorage.setItem("anthropic_api_key", k); }

async function parseOrderWithAI(text, apiKey) {
  const menuList = MENU_DATABASE.map(m => m.name).join("、");
  const prompt = `你是一个餐厅点单助手。请解析以下点单语音文字，提取信息。

菜单中的菜品（只能从这些菜品中匹配）：${menuList}

点单内容：「${text}」

请严格按以下JSON格式返回，不要输出其他内容：
{
  "tableNumber": "完整桌号，保留所有字符，如'方2'就是'方2'，'圆3'就是'圆3'，'V1'就是'V1'，'吉祥'就是'吉祥'，'11'就是'11'，不要截断或简化",
  "action": "add（加菜）或cancel（取消）或new（新建）或weight（补斤数）",
  "items": [{"name": "菜品名（必须完全匹配菜单）", "quantity": 数量}],
  "note": "备注（没有则为空字符串）"
}

规则：
- 说"再加"或"追加"→ action为add；说"取消"或"退"→ cancel
- 说"X斤"且是三味鱼 → action为weight，quantity为斤数（支持小数）
- 其他 → new；说"三味鱼"匹配"筲箕三味鱼"
- 数量词：碗/个/份/盘/道/条 均为数量；斤专用于三味鱼
- 识别不到桌号则tableNumber返回null`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error?.message || `请求失败 (${res.status})`);
  }
  const data = await res.json();
  return JSON.parse(data.content[0].text.trim().replace(/```json|```/g,"").trim());
}

function exportKitchenToExcel(categorySummary, orders) {
  const wb = XLSX.utils.book_new();
  const today = new Date().toLocaleDateString("zh-CN");
  const summaryRows = [["厨房分类汇总 — "+today],[],["分类","菜品","数量（份）"]];
  CATEGORY_ORDER.forEach(cat => {
    if (!categorySummary[cat]) return;
    Object.entries(categorySummary[cat]).sort((a,b)=>b[1]-a[1]).forEach(([name,qty],idx)=>{
      summaryRows.push([idx===0?cat:"", name, qty]);
    });
    summaryRows.push(["","小计",Object.values(categorySummary[cat]).reduce((a,b)=>a+b,0)]);
    summaryRows.push([]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(summaryRows);
  ws1["!cols"]=[{wch:14},{wch:16},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws1, "厨房汇总");
  const detailRows=[["桌号明细 — "+today],[],["桌号","菜品","数量/斤数","单价","小计","备注"]];
  Object.entries(orders).sort((a,b)=>a[0].localeCompare(b[0],"zh-CN",{numeric:true})).forEach(([tn,table])=>{
    table.items.forEach((item,idx)=>{
      const qty=item.weightBased?(item.jin!=null?item.jin+"斤":"待称重"):item.quantity;
      const sub=item.weightBased?(item.jin!=null?(item.price*item.jin).toFixed(1):"—"):item.price*item.quantity;
      detailRows.push([idx===0?tn+"桌":"",item.name,qty,item.price,sub,idx===0&&table.note?table.note:""]);
    });
    const total=table.items.reduce((s,i)=>s+(i.weightBased?(i.jin??0)*i.price:i.price*i.quantity),0);
    detailRows.push(["","","","合计",total.toFixed(1).replace(/\.0$/,"")+"元",""]);
    detailRows.push([]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(detailRows);
  ws2["!cols"]=[{wch:10},{wch:16},{wch:10},{wch:8},{wch:10},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws2,"桌号明细");
  XLSX.writeFile(wb,`厨房汇总_${new Date().toLocaleDateString("zh-CN").replace(/\//g,"-")}.xlsx`);
}

// ========== 组件 ==========
function ApiKeyModal({ onSave }) {
  const [key, setKey] = useState("");
  return (
    <div className="modal">
      <div className="modal-sheet">
        <div className="modal-title">🏮 首次使用设置</div>
        <div className="modal-desc">
          需要填入 <strong style={{color:"var(--gold)"}}>Anthropic API Key</strong> 才能使用 AI 点单解析。<br/>
          获取地址：<a href="https://console.anthropic.com" style={{color:"var(--gold)"}}>console.anthropic.com</a><br/>
          <span style={{fontSize:12,color:"var(--muted)"}}>Key 只保存在本机，不会上传任何地方。</span>
        </div>
        <input className="modal-input" type="password" placeholder="sk-ant-api03-..." value={key}
          onChange={e=>setKey(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&key.trim()&&onSave(key.trim())}
        />
        <button className="modal-btn" onClick={()=>key.trim()&&onSave(key.trim())}>保存并开始使用</button>
      </div>
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = useState(()=>loadApiKey());
  const [orders, setOrders] = useState(()=>loadOrders());
  const [view, setView] = useState("front");
  const [inputText, setInputText] = useState("");
  const [isListening, setIsListening] = useState(false);
  const [isProcessing, setIsProcessing] = useState(false);
  const [toast, setToast] = useState(null);
  const [logs, setLogs] = useState([]);
  const recognitionRef = useRef(null);
  const textareaRef = useRef(null);

  const showToast = (type, text) => {
    setToast({type, text});
    setTimeout(()=>setToast(null), 3000);
  };
  const addLog = text => setLogs(prev=>[{time:new Date().toLocaleTimeString(),text},...prev.slice(0,29)]);

  const startListening = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast("error","请用 Chrome 浏览器开启语音功能"); return; }
    const r = new SR();
    r.lang="zh-CN"; r.continuous=false; r.interimResults=false;
    r.onresult = e => {
      const t = e.results[0][0].transcript;
      setInputText(t);
    };
    r.onend = () => setIsListening(false);
    r.onerror = () => { setIsListening(false); showToast("error","语音识别失败，请重试"); };
    recognitionRef.current = r;
    r.start();
    setIsListening(true);
  };
  const stopListening = () => { recognitionRef.current?.stop(); setIsListening(false); };

  const processOrder = async () => {
    if (!inputText.trim() || isProcessing) return;
    setIsProcessing(true);
    try {
      const parsed = await parseOrderWithAI(inputText, apiKey);
      if (!parsed.tableNumber) { showToast("error","未识别到桌号，请重新输入"); setIsProcessing(false); return; }
      const tableKey = parsed.tableNumber;
      const menuMap = Object.fromEntries(MENU_DATABASE.map(m=>[m.name,m]));

      setOrders(prev => {
        const next = {...prev};
        if (!next[tableKey]) next[tableKey]={items:[],note:""};
        const table = {...next[tableKey], items:[...next[tableKey].items]};

        parsed.items.forEach(({name,quantity})=>{
          if (!menuMap[name]) return;
          const menuItem = menuMap[name];
          const existIdx = table.items.findIndex(i=>i.name===name);
          if (parsed.action==="cancel") {
            if (existIdx>=0) {
              table.items[existIdx]={...table.items[existIdx],quantity:Math.max(0,table.items[existIdx].quantity-quantity)};
              if (table.items[existIdx].quantity===0) table.items.splice(existIdx,1);
            }
          } else if (parsed.action==="weight" && menuItem.weightBased) {
            if (existIdx>=0) table.items[existIdx]={...table.items[existIdx],jin:quantity};
            else table.items.push({...menuItem,quantity:1,jin:quantity});
          } else {
            if (existIdx>=0) table.items[existIdx]={...table.items[existIdx],quantity:table.items[existIdx].quantity+quantity};
            else table.items.push({...menuItem,quantity});
          }
        });

        if (parsed.note) table.note=parsed.note;
        next[tableKey]=table;
        saveOrders(next);
        return next;
      });

      const aText=parsed.action==="cancel"?"取消":parsed.action==="add"?"追加":parsed.action==="weight"?"补斤数":"新增";
      addLog(`${tableKey}号桌 ${aText}：${parsed.items.map(i=>`${i.name}×${i.quantity}`).join("、")}${parsed.note?" 备注:"+parsed.note:""}`);
      showToast("success",`✅ ${tableKey}号桌已更新`);
      setInputText("");
    } catch(e) {
      showToast("error","解析失败："+e.message);
    }
    setIsProcessing(false);
  };

  const categorySummary = (() => {
    const s={};
    Object.values(orders).forEach(t=>t.items.forEach(item=>{
      if (!s[item.category]) s[item.category]={};
      s[item.category][item.name]=(s[item.category][item.name]||0)+item.quantity;
    }));
    return s;
  })();

  const calcItemPrice = item => item.weightBased?(item.jin??0)*item.price:item.price*item.quantity;
  const totalTables = Object.keys(orders).length;
  const totalDishes = Object.values(orders).reduce((s,t)=>s+t.items.reduce((ss,i)=>ss+i.quantity,0),0);
  const totalRevenue = Object.values(orders).reduce((s,t)=>s+t.items.reduce((ss,i)=>ss+calcItemPrice(i),0),0);

  if (!apiKey) return <ApiKeyModal onSave={k=>{saveApiKey(k);setApiKey(k);}}/>;

  return (
    <div className="app">
      {/* Toast */}
      {toast && <div className={`toast ${toast.type}`}>{toast.text}</div>}

      {/* Header */}
      <div className="header">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>🏮</span>
            <div>
              <div style={{fontSize:16,fontWeight:700,letterSpacing:1}}>智能语音点单</div>
              <div style={{fontSize:10,color:"var(--muted)"}}>
                {new Date().toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"short"})}
              </div>
            </div>
          </div>
          <div className="stats">
            <div className="stat"><div className="stat-val">{totalTables}</div><div className="stat-label">桌在用</div></div>
            <div className="stat-divider" style={{margin:"4px 10px"}}/>
            <div className="stat"><div className="stat-val">{totalDishes}</div><div className="stat-label">份总量</div></div>
            <div className="stat-divider" style={{margin:"4px 10px"}}/>
            <div className="stat"><div className={`stat-val revenue`}>¥{totalRevenue.toFixed(0)}</div><div className="stat-label">营业额</div></div>
          </div>
        </div>
      </div>

      {/* 输入区 */}
      <div className="input-panel">
        {isListening && (
          <div className="listening-bar">
            <span className="blink">●</span> 正在录音，请说话…说完后自动停止
          </div>
        )}
        <div className="input-row">
          <textarea
            ref={textareaRef}
            className="order-input"
            rows={2}
            value={inputText}
            onChange={e=>setInputText(e.target.value)}
            placeholder={"方2桌 1条清蒸桂花 2例水煮牛肉 3碗米饭"}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();processOrder();}}}
          />
          <button className={`mic-btn${isListening?" listening":""}`}
            onClick={isListening?stopListening:startListening}>
            {isListening
              ? <svg viewBox="0 0 24 24" fill="#e05050"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
              : <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" strokeWidth="2">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                  <line x1="12" y1="19" x2="12" y2="23"/>
                  <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            }
          </button>
          <button className="submit-btn" onClick={processOrder} disabled={isProcessing||!inputText.trim()}>
            {isProcessing?"解析中":"提交"}
          </button>
        </div>
      </div>

      {/* 内容区 */}
      <div className="content">

        {/* 前台视图 */}
        {view==="front" && (
          <div>
            <div className="toolbar">
              <span style={{fontSize:13,color:"var(--muted)"}}>共 {totalTables} 桌</span>
              <button className="danger-btn" onClick={()=>{if(window.confirm("确定清空今日所有数据？")){setOrders({});saveOrders({});addLog("已清空今日数据");}}}>
                清空今日
              </button>
            </div>
            {Object.keys(orders).length===0
              ? <div className="empty"><div className="empty-icon">🍽️</div>暂无点单，请语音或文字输入</div>
              : Object.entries(orders).sort((a,b)=>a[0].localeCompare(b[0],"zh-CN",{numeric:true})).map(([tn,table])=>{
                  const total=table.items.reduce((s,i)=>s+calcItemPrice(i),0);
                  return (
                    <div key={tn} className="table-card">
                      <div className="table-header">
                        <span className="table-name">🪑 {tn}号桌</span>
                        <div className="table-actions">
                          <span className="badge">{table.items.reduce((s,i)=>s+i.quantity,0)}份</span>
                          <button className="clear-table-btn" onClick={()=>{
                            setOrders(prev=>{const n={...prev};delete n[tn];saveOrders(n);return n;});
                            addLog(`${tn}号桌已清台`);
                          }}>清台</button>
                        </div>
                      </div>
                      {table.items.map((item,idx)=>(
                        <div key={idx} className="item-row">
                          <span className="item-name">{item.name}</span>
                          <span className="item-price-unit">
                            {item.weightBased?`${item.price}/斤`:item.price+"元"}
                          </span>
                          <span className="item-qty">
                            {item.weightBased
                              ? item.jin!=null ? `${item.jin}斤` : <span className="pending-tag">待称重</span>
                              : `×${item.quantity}`}
                          </span>
                          <span className="item-subtotal">
                            {item.weightBased
                              ? item.jin!=null ? (item.price*item.jin).toFixed(1) : "—"
                              : item.price*item.quantity}
                          </span>
                        </div>
                      ))}
                      <div className="table-total">
                        <span className="table-total-label">合计</span>
                        <span className="table-total-amount">¥ {total.toFixed(1).replace(/\.0$/,"")}</span>
                      </div>
                      {table.note && <div className="table-note">📝 {table.note}</div>}
                    </div>
                  );
                })
            }
          </div>
        )}

        {/* 厨房视图 */}
        {view==="kitchen" && (
          <div>
            <div className="toolbar">
              <span style={{fontSize:13,color:"var(--muted)"}}>实时汇总</span>
              {Object.keys(categorySummary).length>0 &&
                <button className="export-btn" onClick={()=>exportKitchenToExcel(categorySummary,orders)}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  导出 Excel
                </button>
              }
            </div>
            {Object.keys(categorySummary).length===0
              ? <div className="empty"><div className="empty-icon">👨‍🍳</div>暂无数据</div>
              : CATEGORY_ORDER.filter(c=>categorySummary[c]).map(cat=>(
                  <div key={cat} className="cat-card">
                    <div className="cat-header">
                      <span>{cat}</span>
                      <span className="badge">{Object.values(categorySummary[cat]).reduce((a,b)=>a+b,0)}份</span>
                    </div>
                    {Object.entries(categorySummary[cat]).sort((a,b)=>b[1]-a[1]).map(([name,qty])=>(
                      <div key={name} className="cat-item">
                        <span>{name}</span>
                        <span className="cat-qty" style={{color:qty>=10?"#e87040":"var(--gold)"}}>{qty}</span>
                      </div>
                    ))}
                  </div>
                ))
            }
          </div>
        )}

        {/* 日志视图 */}
        {view==="log" && (
          <div>
            <div className="toolbar">
              <span style={{fontSize:13,color:"var(--muted)"}}>最近 {logs.length} 条操作</span>
              <button className="danger-btn" onClick={()=>{saveApiKey("");setApiKey("");}}>换 API Key</button>
            </div>
            {logs.length===0
              ? <div className="empty"><div className="empty-icon">📋</div>暂无记录</div>
              : logs.map((log,i)=>(
                  <div key={i} className="log-item">
                    <div className="log-time">{log.time}</div>
                    <div>{log.text}</div>
                  </div>
                ))
            }
          </div>
        )}

        <div style={{height:8}}/>
      </div>

      {/* 底部导航 */}
      <div className="bottom-nav">
        <button className={`nav-btn${view==="front"?" active":""}`} onClick={()=>setView("front")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          前台桌号
        </button>
        <button className={`nav-btn${view==="kitchen"?" active":""}`} onClick={()=>setView("kitchen")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
            <path d="M6 2v6l2 2-2 2v6h12v-6l-2-2 2-2V2"/>
            <line x1="6" y1="6" x2="18" y2="6"/>
            <line x1="6" y1="18" x2="18" y2="18"/>
          </svg>
          厨房汇总
        </button>
        <button className={`nav-btn${view==="log"?" active":""}`} onClick={()=>setView("log")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          操作日志
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
