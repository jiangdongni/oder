</style>

];
const CATEGORY_ORDER = ["鱼鲜类","猪肉内脏类","牛羊肉类","鸡禽类","蔬菜类","主食杂项"];

function loadOrders(){try{const r=localStorage.getItem("orders_"+new Date().toDateString());return r?JSON.parse(r):{};}catch{return{};}}
function saveOrders(o){try{localStorage.setItem("orders_"+new Date().toDateString(),JSON.stringify(o));}catch{}}
function loadApiKey(){return localStorage.getItem("deepseek_api_key")||"";}
function saveApiKey(k){localStorage.setItem("deepseek_api_key",k);}

async function parseOrderWithAI(text,apiKey){
  const menuList=MENU_DATABASE.map(m=>m.name).join("、");
  const prompt=`你是一个餐厅点单助手。请解析以下点单文字（可能是粤语或普通话），提取信息。

菜单（只能从这些菜品中匹配）：${menuList}

点单内容：「${text}」

请严格按以下JSON格式返回，不要输出其他内容：
{
  "tableNumber": "完整桌号，保留所有字符，如'方2'就是'方2'，'圆3'就是'圆3'，'V1'就是'V1'，'吉祥'就是'吉祥'",
  "action": "add（加菜）或cancel（取消）或new（新建）或weight（补斤数）",
  "items": [{"name": "菜品名（必须完全匹配菜单）", "quantity": 数量}],
  "note": "备注（没有则为空字符串）"
}

规则：
- "再加"/"追加" → add；"取消"/"退" → cancel
- 说"X斤"且是三味鱼 → weight，quantity为斤数（支持小数）
- 其他 → new；"三味鱼"匹配"筲箕三味鱼"
- 数量词碗/个/份/盘/道/条/只均为数量；斤专用于三味鱼
- 识别不到桌号则tableNumber返回null`;

  const res=await fetch("https://api.deepseek.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
    body:JSON.stringify({model:"deepseek-chat",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  });
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||`请求失败 (${res.status})`);}
  const data=await res.json();
  return JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,"").trim());
}

function exportKitchenToExcel(categorySummary,orders){
  const wb=XLSX.utils.book_new();
  const today=new Date().toLocaleDateString("zh-CN");
  const summaryRows=[["厨房分类汇总 — "+today],[],["分类","菜品","数量（份）"]];
  CATEGORY_ORDER.forEach(cat=>{
    if(!categorySummary[cat])return;
    Object.entries(categorySummary[cat]).sort((a,b)=>b[1]-a[1]).forEach(([name,qty],idx)=>{summaryRows.push([idx===0?cat:"",name,qty]);});
    summaryRows.push(["","小计",Object.values(categorySummary[cat]).reduce((a,b)=>a+b,0)]);
    summaryRows.push([]);
  });
  const ws1=XLSX.utils.aoa_to_sheet(summaryRows);ws1["!cols"]=[{wch:14},{wch:16},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws1,"厨房汇总");
  const detailRows=[["桌号明细 — "+today],[],["桌号","菜品","数量/斤数","单价","小计","备注"]];
  Object.entries(orders).sort((a,b)=>a[0].localeCompare(b[0],"zh-CN",{numeric:true})).forEach(([tn,table])=>{
    table.items.forEach((item,idx)=>{
      const qty=item.weightBased?(item.jin!=null?item.jin+"斤":"待称重"):item.quantity;
      const sub=item.weightBased?(item.jin!=null?(item.price*item.jin).toFixed(1):"—"):item.price*item.quantity;
      detailRows.push([idx===0?tn+"桌":"",item.name,qty,item.price,sub,idx===0&&table.note?table.note:""]);
    });
    const total=table.items.reduce((s,i)=>s+(i.weightBased?(i.jin??0)*i.price:i.price*i.quantity),0);
    detailRows.push(["","","","合计",total.toFixed(1).replace(/\.0$/,"")+"元",""]);
    detailRows.push([]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(detailRows);ws2["!cols"]=[{wch:10},{wch:16},{wch:10},{wch:8},{wch:10},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws2,"桌号明细");
  XLSX.writeFile(wb,`厨房汇总_${new Date().toLocaleDateString("zh-CN").replace(/\//g,"-")}.xlsx`);
}

function ApiKeyModal({onSave}){
  const [key,setKey]=useState("");
  return(
    <div className="modal">
      <div className="modal-sheet">
        <div className="modal-title">🏮 首次使用设置</div>
        <div className="modal-desc">
          需要填入 <strong style={{color:"#c8340a"}}>DeepSeek API Key</strong> 才能使用 AI 点单解析。<br/>
          获取地址：<a href="https://platform.deepseek.com/api_keys" style={{color:"#c8340a"}}>platform.deepseek.com</a><br/>
          <span style={{fontSize:13,color:"#aaa"}}>Key 只保存在本机，不会上传任何地方。</span>
        </div>
        <input className="modal-input" type="password" placeholder="sk-..." value={key}
          onChange={e=>setKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&key.trim()&&onSave(key.trim())}/>
        <button className="modal-btn" onClick={()=>key.trim()&&onSave(key.trim())}>保存并开始使用</button>
      </div>
    </div>
  );
}

function App(){
  const [apiKey,setApiKey]=useState(()=>loadApiKey());
  const [orders,setOrders]=useState(()=>loadOrders());
  const [view,setView]=useState("front");
  const [inputText,setInputText]=useState("");
  const [isListening,setIsListening]=useState(false);
  const [isProcessing,setIsProcessing]=useState(false);
  const [toast,setToast]=useState(null);
  const [logs,setLogs]=useState([]);
  const [lang,setLang]=useState("zh-HK");
  const recognitionRef=useRef(null);

  const showToast=(type,text)=>{setToast({type,text});setTimeout(()=>setToast(null),3000);};
  const addLog=text=>setLogs(prev=>[{time:new Date().toLocaleTimeString(),text},...prev.slice(0,29)]);

  const startListening=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast("error","请用 Chrome 或 Safari 浏览器开启语音功能");return;}
    const r=new SR();
    r.lang=lang;r.continuous=false;r.interimResults=false;
    r.onresult=e=>setInputText(e.results[0][0].transcript);
    r.onend=()=>setIsListening(false);
    r.onerror=()=>{setIsListening(false);showToast("error","语音识别失败，请重试");};
    recognitionRef.current=r;r.start();setIsListening(true);
  };
  const stopListening=()=>{recognitionRef.current?.stop();setIsListening(false);};

  const processOrder=async()=>{
    if(!inputText.trim()||isProcessing)return;
    setIsProcessing(true);
    try{
      const parsed=await parseOrderWithAI(inputText,apiKey);
      if(!parsed.tableNumber){showToast("error","未识别到桌号，请重新输入");setIsProcessing(false);return;}
      const tableKey=parsed.tableNumber;
      const menuMap=Object.fromEntries(MENU_DATABASE.map(m=>[m.name,m]));
      setOrders(prev=>{
        const next={...prev};
        if(!next[tableKey])next[tableKey]={items:[],note:""};
        const table={...next[tableKey],items:[...next[tableKey].items]};
        parsed.items.forEach(({name,quantity})=>{
          if(!menuMap[name])return;
          const menuItem=menuMap[name];
          const existIdx=table.items.findIndex(i=>i.name===name);
          if(parsed.action==="cancel"){
            if(existIdx>=0){table.items[existIdx]={...table.items[existIdx],quantity:Math.max(0,table.items[existIdx].quantity-quantity)};if(table.items[existIdx].quantity===0)table.items.splice(existIdx,1);}
          }else if(parsed.action==="weight"&&menuItem.weightBased){
            if(existIdx>=0)table.items[existIdx]={...table.items[existIdx],jin:quantity};
            else table.items.push({...menuItem,quantity:1,jin:quantity});
          }else{
            if(existIdx>=0)table.items[existIdx]={...table.items[existIdx],quantity:table.items[existIdx].quantity+quantity};
            else table.items.push({...menuItem,quantity});
          }
        });
        if(parsed.note)table.note=parsed.note;
        next[tableKey]=table;saveOrders(next);return next;
      });
      const aText=parsed.action==="cancel"?"取消":parsed.action==="add"?"追加":parsed.action==="weight"?"补斤数":"新增";
      addLog(`${tableKey}号桌 ${aText}：${parsed.items.map(i=>`${i.name}×${i.quantity}`).join("、")}${parsed.note?" 备注:"+parsed.note:""}`);
      showToast("success",`✅ ${tableKey}号桌已更新`);
      setInputText("");
    }catch(e){showToast("error","解析失败："+e.message);}
    setIsProcessing(false);
  };

  const categorySummary=(()=>{const s={};Object.values(orders).forEach(t=>t.items.forEach(item=>{if(!s[item.category])s[item.category]={};s[item.category][item.name]=(s[item.category][item.name]||0)+item.quantity;}));return s;})();
  const calcItemPrice=item=>item.weightBased?(item.jin??0)*item.price:item.price*item.quantity;
  const totalTables=Object.keys(orders).length;
  const totalDishes=Object.values(orders).reduce((s,t)=>s+t.items.reduce((ss,i)=>ss+i.quantity,0),0);
  const totalRevenue=Object.values(orders).reduce((s,t)=>s+t.items.reduce((ss,i)=>ss+calcItemPrice(i),0),0);

  if(!apiKey)return <ApiKeyModal onSave={k=>{saveApiKey(k);setApiKey(k);}}/>;

  return(
    <div className="app">
      {toast&&<div className={`toast ${toast.type}`}>{toast.text}</div>}

      <div className="header">
        <div className="header-top">
          <div>
            <div className="header-title">🏮 智能语音点单</div>
            <div className="header-date">{new Date().toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"short"})}</div>
          </div>
          <button onClick={()=>{saveApiKey("");setApiKey("");}} style={{padding:"6px 12px",border:"1.5px solid rgba(255,255,255,0.5)",background:"transparent",color:"rgba(255,255,255,0.85)",borderRadius:8,fontFamily:"inherit",fontSize:13,cursor:"pointer"}}>换Key</button>
        </div>
        <div className="stats-bar">
          <div className="stat"><div className="stat-val">{totalTables}</div><div className="stat-label">桌在用</div></div>
          <div className="stat-divider"/>
          <div className="stat"><div className="stat-val">{totalDishes}</div><div className="stat-label">份总量</div></div>
          <div className="stat-divider"/>
          <div className="stat"><div className="stat-val">¥{totalRevenue.toFixed(0)}</div><div className="stat-label">今日营业额</div></div>
        </div>
      </div>

      <div className="input-panel">
        <div className="lang-toggle">
          <button className={`lang-btn${lang==="zh-HK"?" active":""}`} onClick={()=>setLang("zh-HK")}>🎙 粤语</button>
          <button className={`lang-btn${lang==="zh-CN"?" active":""}`} onClick={()=>setLang("zh-CN")}>🎙 普通话</button>
        </div>
        {isListening&&(
          <div className="listening-bar">
            <span className="blink">●</span> 正在录音（{lang==="zh-HK"?"粤语":"普通话"}）…说完后自动停止
          </div>
        )}
        <div className="input-row">
          <textarea className="order-input" rows={2} value={inputText}
            onChange={e=>setInputText(e.target.value)}
            placeholder="例：方2桌 清蒸桂花1条 水煮牛肉2例 米饭3碗"
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();processOrder();}}}
          />
          <button className={`mic-btn${isListening?" listening":""}`} onClick={isListening?stopListening:startListening}>
            {isListening
              ?<svg viewBox="0 0 24 24" width="22" height="22" fill="#d94040"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
              :<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#c8340a" strokeWidth="2.5">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            }
          </button>
          <button className="submit-btn" onClick={processOrder} disabled={isProcessing||!inputText.trim()}>
            {isProcessing?"解析中":"提交"}
          </button>
        </div>
      </div>

      <div className="content">
        {view==="front"&&(
          <div>
            <div className="toolbar">
              <span className="toolbar-label">共 {totalTables} 桌</span>
              <button className="danger-btn" onClick={()=>{if(window.confirm("确定清空今日所有数据？")){setOrders({});saveOrders({});addLog("已清空今日数据");}}}>清空今日</button>
            </div>
            {Object.keys(orders).length===0
              ?<div className="empty"><div className="empty-icon">🍽️</div><div className="empty-text">暂无点单，请语音或文字输入</div></div>
              :Object.entries(orders).sort((a,b)=>a[0].localeCompare(b[0],"zh-CN",{numeric:true})).map(([tn,table])=>{
                const total=table.items.reduce((s,i)=>s+calcItemPrice(i),0);
                return(
                  <div key={tn} className="table-card">
                    <div className="table-header">
                      <span className="table-name">🪑 {tn}号桌</span>
                      <div className="table-actions">
                        <span className="badge">{table.items.reduce((s,i)=>s+i.quantity,0)}份</span>
                        <button className="clear-table-btn" onClick={()=>{setOrders(prev=>{const n={...prev};delete n[tn];saveOrders(n);return n;});addLog(`${tn}号桌已清台`);}}>清台</button>
                      </div>
                    </div>
                    <div className="col-header">
                      <span style={{flex:2}}>菜品</span>
                      <span style={{flex:"0 0 60px",textAlign:"center"}}>单价</span>
                      <span style={{flex:"0 0 60px",textAlign:"center"}}>数量</span>
                      <span style={{flex:"0 0 52px",textAlign:"right"}}>小计</span>
                    </div>
                    {table.items.map((item,idx)=>(
                      <div key={idx} className="item-row">
                        <span className="item-name">{item.name}</span>
                        <span className="item-price-col">{item.weightBased?`${item.price}/斤`:item.price+"元"}</span>
                        <span className="item-qty-col">
                          {item.weightBased?item.jin!=null?`${item.jin}斤`:<span className="pending-tag">待称重</span>:`×${item.quantity}`}
                        </span>
                        <span className="item-sub-col">
                          {item.weightBased?item.jin!=null?(item.price*item.jin).toFixed(1):"—":item.price*item.quantity}
                        </span>
                      </div>
                    ))}
                    <div className="table-total">
                      <span className="table-total-label">合计</span>
                      <span className="table-total-amount">¥{total.toFixed(1).replace(/\.0$/,"")}</span>
                    </div>
                    {table.note&&<div className="table-note">📝 {table.note}</div>}
                  </div>
                );
              })
            }
          </div>
        )}

        {view==="kitchen"&&(
          <div>
            <div className="toolbar">
              <span className="toolbar-label">实时汇总</span>
              {Object.keys(categorySummary).length>0&&
                <button className="export-btn" onClick={()=>exportKitchenToExcel(categorySummary,orders)}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  导出Excel
                </button>
              }
            </div>
            {Object.keys(categorySummary).length===0
              ?<div className="empty"><div className="empty-icon">👨‍🍳</div><div className="empty-text">暂无数据</div></div>
              :CATEGORY_ORDER.filter(c=>categorySummary[c]).map(cat=>(
                <div key={cat} className="cat-card">
                  <div className="cat-header"><span>{cat}</span><span className="badge">{Object.values(categorySummary[cat]).reduce((a,b)=>a+b,0)}份</span></div>
                  {Object.entries(categorySummary[cat]).sort((a,b)=>b[1]-a[1]).map(([name,qty])=>(
                    <div key={name} className="cat-item">
                      <span>{name}</span>
                      <span className="cat-qty" style={{color:qty>=10?"#d94040":"#c8340a"}}>{qty}</span>
                    </div>
                  ))}
                </div>
              ))
            }
          </div>
        )}

        {view==="log"&&(
          <div>
            <div className="toolbar"><span className="toolbar-label">最近 {logs.length} 条操作</span></div>
            {logs.length===0
              ?<div className="empty"><div className="empty-icon">📋</div><div className="empty-text">暂无记录</div></div>
              :logs.map((log,i)=>(
                <div key={i} className="log-item">
                  <div className="log-time">{log.time}</div>
                  <div>{log.text}</div>
                </div>
              ))
            }
          </div>
        )}
        <div style={{height:8}}/>
      </div>

      <div className="bottom-nav">
        <button className={`nav-btn${view==="front"?" active":""}`} onClick={()=>setView("front")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          前台桌号
        </button>
        <button className={`nav-btn${view==="kitchen"?" active":""}`} onClick={()=>setView("kitchen")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 2v6l2 2-2 2v6h12v-6l-2-2 2-2V2"/><line x1="6" y1="6" x2="18" y2="6"/><line x1="6" y1="18" x2="18" y2="18"/></svg>
          厨房汇总
        </button>
        <button className={`nav-btn${view==="log"?" active":""}`} onClick={()=>setView("log")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          操作日志
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
